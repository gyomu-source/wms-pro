<script>
window.addEventListener('load', function() {
  document.querySelectorAll('script[type="text/babel"]').forEach(function(s) {
    try {
      var src = s.textContent;
      // DATA_VERSIONを取得してlocalStorageのバージョンチェック
      var verMatch = src.match(/const DATA_VERSION='([^']+)';/);
      if(verMatch) {
        var ver = verMatch[1];
        if(localStorage.getItem('wms_data_version') !== ver) {
          localStorage.removeItem('wms_products');
          localStorage.removeItem('wms_inventory');
          // 履歴は引き継ぐ
        }
      }
      var compiled = Babel.transform(src, {presets: [['react', {runtime:'classic'}]]}).code;
      (new Function(compiled))();
    } catch(e) { console.error('Babel error:', e); }
  });
});
</script>

function useLS(key,init){
  const[v,setV]=useState(()=>{
    try{
      const ver=localStorage.getItem('wms_data_version');
      const s=localStorage.getItem(key);
      if(ver!==DATA_VERSION&&key!=='wms_history'){localStorage.removeItem(key);return init;}
      return s?JSON.parse(s):init;
    }catch{return init}
  });
  useEffect(()=>{localStorage.setItem(key,JSON.stringify(v));localStorage.setItem('wms_data_version',DATA_VERSION)},[key,v]);
  return[v,setV];
}
function genId(p='X'){return`${p}${Date.now().toString(36).toUpperCase()}${Math.random().toString(36).slice(2,5).toUpperCase()}`}
function fmtDT(s){if(!s)return'';const d=new Date(s);return`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`}
function fmtD(s){if(!s)return'';return fmtDT(s).slice(0,10)}
function totalStock(inv){return LOC_KEYS.reduce((s,k)=>s+(inv[k]||0),0)}
function stockStatus(total,safe,reorder){if(total===0)return'zero';if(total<=safe)return'reorder';if(total<=reorder)return'low';return'ok'}

function dlCSV(name,csv){
  const b=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
  const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=name;a.click();URL.revokeObjectURL(u);
}
function toCSV(rows){
  if(!rows.length)return'';
  const ks=Object.keys(rows[0]);
  return[ks.join(','),...rows.map(r=>ks.map(k=>`"${String(r[k]??'').replace(/"/g,'""')}"`).join(','))].join('\n');
}

// ── DASHBOARD ──────────────────────────────
function Dashboard({products,inventory,history}){
  const active=products.filter(p=>p.active);
  const tot=active.reduce((s,p)=>s+totalStock(inventory[p.id]||{}),0);
  const lowCnt=active.filter(p=>{const t=totalStock(inventory[p.id]||{});return t>0&&t<=p.safetyStock}).length;
  const zeroCnt=active.filter(p=>totalStock(inventory[p.id]||{})===0).length;
  const locTot=LOC_KEYS.reduce((a,k)=>{a[k]=active.reduce((s,p)=>s+(inventory[p.id]?.[k]||0),0);return a},{});
  const recent=[...history].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,10);
  const alerts=active.filter(p=>totalStock(inventory[p.id]||{})<=p.safetyStock).slice(0,6);
  const tcol={inbound:['#16a34a','#dcfce7'],outbound:['#dc2626','#fee2e2'],transfer:['#2563eb','#dbeafe'],adjustment:['#7c3aed','#ede9fe']};
  return(
    <div>
      <div style={S.grid4}>
        {[['#2563eb','総商品数',active.length,'件'],['#16a34a','全拠点総在庫',tot.toLocaleString(),'個'],['#d97706','在庫不足',lowCnt,'件'],['#dc2626','在庫0商品',zeroCnt,'件']].map(([c,l,v,u])=>(
          <div key={l} style={S.statCard(c)}>
            <div style={S.statL}>{l}</div>
            <div style={{...S.statV,color:c}}>{v}<span style={{fontSize:13,fontWeight:400}}> {u}</span></div>
          </div>
        ))}
      </div>
      <div style={S.grid2}>
        <div style={S.card}>
          <div style={{fontWeight:700,marginBottom:14,fontSize:14}}>拠点別在庫数</div>
          {LOC_KEYS.map(k=>(
            <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'7px 0',borderBottom:'1px solid #f1f5f9'}}>
              <span style={{color:'#374151'}}>{LOC[k]}</span>
              <span style={{fontWeight:700}}>{locTot[k].toLocaleString()} 個</span>
            </div>
          ))}
        </div>
        <div style={S.card}>
          <div style={{fontWeight:700,marginBottom:14,fontSize:14}}>要確認商品</div>
          {alerts.length===0?<div style={{color:'#6b7280',fontSize:13}}>在庫不足なし</div>:alerts.map(p=>{
            const inv=inventory[p.id]||{};const t=totalStock(inv);const st=stockStatus(t,p.safetyStock,p.reorderStock);const s=STATUS_DEF[st];
            return(
              <div key={p.id} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid #f1f5f9'}}>
                <div><div style={{fontWeight:600,fontSize:13}}>{p.name}</div><div style={{fontSize:11,color:'#6b7280'}}>{p.sku}</div></div>
                <div style={{textAlign:'right'}}>
                  <span style={S.badge(s.color,s.bg)}>{s.label}</span>
                  <div style={{fontSize:11,color:'#6b7280',marginTop:2}}>{t} / 安全:{p.safetyStock}</div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
      <div style={S.card}>
        <div style={{fontWeight:700,marginBottom:14,fontSize:14}}>直近の入出庫履歴</div>
        <div style={{overflowX:'auto'}}>
          <table style={S.tbl}>
            <thead><tr>
              <th style={S.th}>処理日時</th><th style={S.th}>種別</th><th style={S.th}>商品名</th>
              <th style={S.th}>数量</th><th style={S.th}>拠点</th><th style={S.th}>担当者</th>
            </tr></thead>
            <tbody>
              {recent.length===0?<tr><td colSpan={6} style={{...S.td,textAlign:'center',color:'#9ca3af'}}>履歴なし</td></tr>:
              recent.map(h=>{
                const[c,b]=tcol[h.type]||['#6b7280','#f9fafb'];
                const loc=h.type==='transfer'?`${LOC[h.fromLocation]||''} → ${LOC[h.toLocation]||''}`:LOC[h.location]||'';
                return(
                  <tr key={h.id}>
                    <td style={{...S.td,whiteSpace:'nowrap',fontSize:12}}>{fmtDT(h.date)}</td>
                    <td style={S.td}><span style={S.badge(c,b)}>{HTYPE[h.type]}</span></td>
                    <td style={S.td}><div style={{fontWeight:600}}>{h.productName}</div><div style={{fontSize:11,color:'#6b7280'}}>{h.sku}</div></td>
                    <td style={{...S.td,textAlign:'right',fontWeight:700}}>{h.quantity}</td>
                    <td style={{...S.td,fontSize:12}}>{loc}</td>
                    <td style={S.td}>{h.operator}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ── INVENTORY LIST ──────────────────────────
function InventoryList({products,inventory}){
  const[f,setF]=useState({name:'',sku:'',jan:'',category:'',location:'',mall:'',status:''});
  const rows=useMemo(()=>products.filter(p=>{
    const inv=inventory[p.id]||{};const t=totalStock(inv);const st=stockStatus(t,p.safetyStock,p.reorderStock);
    if(f.name&&!p.name.includes(f.name))return false;
    if(f.sku&&!p.sku.includes(f.sku))return false;
    if(f.jan&&!(p.jan||'').includes(f.jan))return false;
    if(f.category&&p.category!==f.category)return false;
    if(f.location&&!(inv[f.location]>0))return false;
    if(f.mall&&!(p.malls||[]).includes(f.mall))return false;
    if(f.status&&st!==f.status)return false;
    return true;
  }),[products,inventory,f]);
  return(
    <div>
      <div style={{...S.card,padding:'12px 16px'}}>
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8,marginBottom:8}}>
          <input style={S.inp} placeholder="商品名" value={f.name} onChange={e=>setF(x=>({...x,name:e.target.value}))}/>
          <input style={S.inp} placeholder="SKU" value={f.sku} onChange={e=>setF(x=>({...x,sku:e.target.value}))}/>
          <input style={S.inp} placeholder="JANコード" value={f.jan} onChange={e=>setF(x=>({...x,jan:e.target.value}))}/>
          <select style={S.sel} value={f.category} onChange={e=>setF(x=>({...x,category:e.target.value}))}><option value="">カテゴリ（全て）</option>{CATS.map(c=><option key={c}>{c}</option>)}</select>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}}>
          <select style={S.sel} value={f.location} onChange={e=>setF(x=>({...x,location:e.target.value}))}><option value="">保管拠点（全て）</option>{LOC_KEYS.map(k=><option key={k} value={k}>{LOC[k]}</option>)}</select>
          <select style={S.sel} value={f.mall} onChange={e=>setF(x=>({...x,mall:e.target.value}))}><option value="">販売モール（全て）</option>{MALL_KEYS.map(k=><option key={k} value={k}>{MALL[k]}</option>)}</select>
          <select style={S.sel} value={f.status} onChange={e=>setF(x=>({...x,status:e.target.value}))}><option value="">在庫ステータス（全て）</option>{Object.entries(STATUS_DEF).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}</select>
        </div>
      </div>
      <div style={S.card}>
        <div style={{fontSize:12,color:'#6b7280',marginBottom:8}}>{rows.length}件表示</div>
        <div style={{overflowX:'auto'}}>
          <table style={S.tbl}>
            <thead><tr>
              <th style={S.th}>商品名</th><th style={S.th}>SKU</th>
              <th style={{...S.th,textAlign:'right'}}>楽天L.</th><th style={{...S.th,textAlign:'right'}}>西天満</th>
              <th style={{...S.th,textAlign:'right'}}>堺倉庫</th><th style={{...S.th,textAlign:'right'}}>AmazonFBA</th>
              <th style={{...S.th,textAlign:'right'}}>合計</th><th style={{...S.th,textAlign:'right'}}>安全在庫</th>
              <th style={S.th}>ステータス</th><th style={S.th}>販売モール</th>
            </tr></thead>
            <tbody>
              {rows.map(p=>{
                const inv=inventory[p.id]||{rakuten:0,nishitenma:0,sakai:0,amazonFBA:0};
                const t=totalStock(inv);const st=stockStatus(t,p.safetyStock,p.reorderStock);const s=STATUS_DEF[st];
                const rowBg=st==='zero'?'#fff5f5':st==='reorder'?'#fffbf0':'';
                return(
                  <tr key={p.id} style={{background:rowBg}}>
                    <td style={S.td}><div style={{fontWeight:600,color:st==='zero'?'#dc2626':'#0f172a'}}>{p.name}</div><div style={{fontSize:11,color:'#6b7280'}}>{p.jan}</div></td>
                    <td style={{...S.td,fontFamily:'monospace',fontSize:12}}>{p.sku}</td>
                    {LOC_KEYS.map(k=><td key={k} style={{...S.td,textAlign:'right',color:(inv[k]||0)===0?'#d1d5db':'#0f172a',fontWeight:(inv[k]||0)>0?600:400}}>{inv[k]||0}</td>)}
                    <td style={{...S.td,textAlign:'right',fontWeight:700,color:st==='zero'||st==='reorder'?'#dc2626':'#0f172a'}}>{t}</td>
                    <td style={{...S.td,textAlign:'right'}}>{p.safetyStock}</td>
                    <td style={S.td}><span style={S.badge(s.color,s.bg)}>{s.label}</span></td>
                    <td style={S.td}><div style={{display:'flex',gap:2,flexWrap:'wrap'}}>{(p.malls||[]).map(m=><span key={m} style={{...S.badge('#374151','#f3f4f6'),fontSize:10}}>{MALL[m]}</span>)}</div></td>

                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ── INBOUND ─────────────────────────────────
function Inbound({products,inventory,setInventory,addHist}){
  const today=new Date().toISOString().slice(0,10);
  const[form,setForm]=useState({date:today,pid:'',location:'rakuten',qty:'',supplier:'',operator:'',note:''});
  const[errs,setErrs]=useState({});const[ok,setOk]=useState('');
  const curProd=products.find(p=>p.id===form.pid);
  const validate=()=>{const e={};if(!form.pid)e.pid='商品を選択してください';if(!form.qty||+form.qty<=0)e.qty='1以上を入力してください';return e};
  const submit=()=>{
    const e=validate();if(Object.keys(e).length){setErrs(e);return}
    const q=+form.qty;
    setInventory(v=>({...v,[form.pid]:{...(v[form.pid]||{}),[form.location]:((v[form.pid]||{})[form.location]||0)+q}}));
    addHist({type:'inbound',productId:form.pid,productName:curProd.name,sku:curProd.sku,quantity:q,location:form.location,supplier:form.supplier,operator:form.operator,note:form.note,date:new Date().toISOString()});
    setOk(`入庫完了：${curProd.name} × ${q}個 → ${LOC[form.location]}`);
    setForm(f=>({...f,pid:'',qty:'',supplier:'',operator:'',note:''}));setErrs({});
    setTimeout(()=>setOk(''),4000);
  };
  return(
    <div>
      {ok&&<div style={S.alertBox('ok')}>{ok}</div>}
      <div style={S.card}>
        <div style={{fontSize:15,fontWeight:700,marginBottom:18}}>入庫処理</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>

// ── OUTBOUND ────────────────────────────────

  const curProd=products.find(p=>p.id===form.pid);

    const e={};if(!form.pid)e.pid='商品を選択してください';

    addHist({type:'outbound',productId:form.pid,productName:curProd.name,sku:curProd.sku,quantity:q,location:form.location,mall:form.mall,orderNo:form.orderNo,operator:form.operator,note:form.note,date:new Date().toISOString()});

// ── TRANSFER ────────────────────────────────
function Transfer({products,inventory,setInventory,addHist}){
  const today=new Date().toISOString().slice(0,10);
  const[form,setForm]=useState({date:today,pid:'',from:'sakai',to:'rakuten',qty:'',operator:'',note:''});
  const[errs,setErrs]=useState({});const[ok,setOk]=useState('');
  const curProd=products.find(p=>p.id===form.pid);
  const fromStock=form.pid?(inventory[form.pid]?.[form.from]||0):0;
  const validate=()=>{
    const e={};if(!form.pid)e.pid='商品を選択してください';
    if(form.from===form.to)e.to='移動元と移動先が同じです';
    const q=+form.qty;if(!form.qty||q<=0)e.qty='1以上を入力してください';else if(q>fromStock)e.qty=`移動元在庫(${fromStock})を超えています`;
    return e;
  };
  const submit=()=>{
    const e=validate();if(Object.keys(e).length){setErrs(e);return}
    const q=+form.qty;
    setInventory(v=>({...v,[form.pid]:{...(v[form.pid]||{}),[form.from]:fromStock-q,[form.to]:((v[form.pid]||{})[form.to]||0)+q}}));
    addHist({type:'transfer',productId:form.pid,productName:curProd.name,sku:curProd.sku,quantity:q,fromLocation:form.from,toLocation:form.to,operator:form.operator,note:form.note,date:new Date().toISOString()});

    <div>
      {ok&&<div style={S.alertBox('ok')}>{ok}</div>}

        <div style={{fontSize:15,fontWeight:700,marginBottom:18}}>拠点間移動処理</div>

          <div style={S.fg}><label style={S.lbl}>移動元拠点 *</label><select style={S.sel} value={form.from} onChange={e=>setForm(f=>({...f,from:e.target.value}))}>{LOC_KEYS.map(k=><option key={k} value={k}>{LOC[k]}</option>)}</select></div>
          <div style={S.fg}><label style={S.lbl}>移動先拠点 *</label><select style={S.sel} value={form.to} onChange={e=>setForm(f=>({...f,to:e.target.value}))}>{LOC_KEYS.map(k=><option key={k} value={k}>{LOC[k]}</option>)}</select>{errs.to&&<div style={S.err}>{errs.to}</div>}</div>
          <div style={S.fg}><label style={S.lbl}>移動数 *{form.pid&&<span style={{fontWeight:400,color:'#6b7280'}}> （移動元在庫: {fromStock}）</span>}</label><input type="number" min="1" style={S.inp} value={form.qty} onChange={e=>setForm(f=>({...f,qty:e.target.value}))}/>{errs.qty&&<div style={S.err}>{errs.qty}</div>}</div>
          <div style={S.fg}><label style={S.lbl}>担当者</label><input style={S.inp} value={form.operator} onChange={e=>setForm(f=>({...f,operator:e.target.value}))}/></div>

      </div>
    </div>

// ── ADJUSTMENT ──────────────────────────────
function Adjustment({products,inventory,setInventory,addHist}){
  const today=new Date().toISOString().slice(0,10);
  const[form,setForm]=useState({date:today,pid:'',location:'rakuten',after:'',reason:'棚卸し差異',operator:'',note:''});
  const[errs,setErrs]=useState({});const[confirm,setConfirm]=useState(false);const[ok,setOk]=useState('');
  const before=form.pid?(inventory[form.pid]?.[form.location]||0):0;
  const diff=form.after!==''?+form.after-before:null;
  const validate=()=>{const e={};if(!form.pid)e.pid='商品を選択してください';if(form.after===''||+form.after<0)e.after='0以上を入力してください';return e};
  const curProd=products.find(p=>p.id===form.pid);
  const doSubmit=()=>{
    const q=+form.after;
    setInventory(v=>({...v,[form.pid]:{...(v[form.pid]||{}),[form.location]:q}}));
    addHist({type:'adjustment',productId:form.pid,productName:curProd.name,sku:curProd.sku,quantity:Math.abs(diff),beforeQty:before,afterQty:q,diff,location:form.location,reason:form.reason,operator:form.operator,note:form.note,date:new Date().toISOString()});
    setOk(`調整完了：${curProd.name} / ${LOC[form.location]} : ${before} → ${q}（差分 ${diff>=0?'+':''}${diff}）`);
    setForm(f=>({...f,pid:'',after:'',operator:'',note:''}));setConfirm(false);
    setTimeout(()=>setOk(''),5000);
  };
  return(
    <div>
      {ok&&<div style={S.alertBox('ok')}>{ok}</div>}
      <div style={{...S.alertBox('warn'),marginBottom:14}}><strong>注意：</strong>在庫調整は在庫数を直接変更する重要な操作です。実行前に在庫を確認してください。</div>
      <div style={S.card}>
        <div style={{fontSize:15,fontWeight:700,marginBottom:18}}>在庫調整</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
          <div style={S.fg}><label style={S.lbl}>調整日 *</label><input type="date" style={S.inp} value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}/></div>
          <div style={S.fg}><label style={S.lbl}>商品 *</label><select style={S.sel} value={form.pid} onChange={e=>setForm(f=>({...f,pid:e.target.value}))}><option value="">選択してください</option>{products.filter(p=>p.active).map(p=><option key={p.id} value={p.id}>{p.name}（{p.sku}）</option>)}</select>{errs.pid&&<div style={S.err}>{errs.pid}</div>}</div>
          <div style={S.fg}><label style={S.lbl}>対象拠点 *</label><select style={S.sel} value={form.location} onChange={e=>setForm(f=>({...f,location:e.target.value}))}>{LOC_KEYS.map(k=><option key={k} value={k}>{LOC[k]}</option>)}</select></div>
          <div style={S.fg}><label style={S.lbl}>調整後在庫数 *</label><input type="number" min="0" style={S.inp} value={form.after} onChange={e=>setForm(f=>({...f,after:e.target.value}))}/>{errs.after&&<div style={S.err}>{errs.after}</div>}</div>
          <div style={S.fg}><label style={S.lbl}>調整理由 *</label><select style={S.sel} value={form.reason} onChange={e=>setForm(f=>({...f,reason:e.target.value}))}>{ADJ_REASONS.map(r=><option key={r}>{r}</option>)}</select></div>
          <div style={S.fg}><label style={S.lbl}>担当者</label><input style={S.inp} value={form.operator} onChange={e=>setForm(f=>({...f,operator:e.target.value}))}/></div>
        </div>
        {form.pid&&(
          <div style={{background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:6,padding:'10px 14px',marginBottom:14}}>
            <div style={{display:'flex',gap:24,fontSize:13}}>
              <div><span style={{color:'#6b7280'}}>調整前：</span><strong>{before}</strong></div>
              <div><span style={{color:'#6b7280'}}>調整後：</span><strong>{form.after!==''?form.after:'-'}</strong></div>
              <div><span style={{color:'#6b7280'}}>差分：</span><strong style={{color:diff>0?'#16a34a':diff<0?'#dc2626':'#374151'}}>{diff!==null?`${diff>=0?'+':''}${diff}`:'-'}</strong></div>
            </div>
          </div>
        )}
        <div style={S.fg}><label style={S.lbl}>備考</label><textarea style={{...S.inp,height:56,resize:'vertical'}} value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))}/></div>
        <div style={{display:'flex',justifyContent:'flex-end'}}><button style={S.btn('warn')} onClick={()=>{const e=validate();if(Object.keys(e).length){setErrs(e);return}setConfirm(true)}}>調整を確認して実行</button></div>
      </div>
      {confirm&&curProd&&<Confirm msg={`在庫調整を実行しますか？\n\n商品：${curProd.name}\n拠点：${LOC[form.location]}\n${before} → ${form.after}（差分 ${diff>=0?'+':''}${diff}）\n理由：${form.reason}`} onOk={doSubmit} onCancel={()=>setConfirm(false)}/>}
    </div>
  );
}

// ── HISTORY ─────────────────────────────────
function History({history}){
  const[f,setF]=useState({from:'',to:'',name:'',sku:'',type:'',location:'',mall:'',operator:''});
  const tcol={inbound:['#15803d','#dcfce7'],outbound:['#dc2626','#fee2e2'],transfer:['#1d4ed8','#dbeafe'],adjustment:['#7c3aed','#ede9fe']};
  const rows=useMemo(()=>[...history].sort((a,b)=>new Date(b.date)-new Date(a.date)).filter(h=>{
    if(f.from&&h.date<f.from)return false;
    if(f.to&&h.date>f.to+'T23:59:59')return false;
    if(f.name&&!h.productName?.includes(f.name))return false;
    if(f.sku&&!h.sku?.includes(f.sku))return false;
    if(f.type&&h.type!==f.type)return false;
    if(f.location&&h.location!==f.location&&h.fromLocation!==f.location&&h.toLocation!==f.location)return false;
    if(f.mall&&h.mall!==f.mall)return false;
    if(f.operator&&!h.operator?.includes(f.operator))return false;
    return true;
  }),[history,f]);
  return(
    <div>
      <div style={{...S.card,padding:'12px 16px'}}>
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8,marginBottom:8}}>
          <div><label style={{...S.lbl,fontSize:11}}>開始日</label><input type="date" style={S.inp} value={f.from} onChange={e=>setF(x=>({...x,from:e.target.value}))}/></div>
          <div><label style={{...S.lbl,fontSize:11}}>終了日</label><input type="date" style={S.inp} value={f.to} onChange={e=>setF(x=>({...x,to:e.target.value}))}/></div>
          <input style={S.inp} placeholder="商品名" value={f.name} onChange={e=>setF(x=>({...x,name:e.target.value}))}/>
          <input style={S.inp} placeholder="SKU" value={f.sku} onChange={e=>setF(x=>({...x,sku:e.target.value}))}/>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8}}>
          <select style={S.sel} value={f.type} onChange={e=>setF(x=>({...x,type:e.target.value}))}><option value="">処理種別（全て）</option>{Object.entries(HTYPE).map(([k,v])=><option key={k} value={k}>{v}</option>)}</select>
          <select style={S.sel} value={f.location} onChange={e=>setF(x=>({...x,location:e.target.value}))}><option value="">拠点（全て）</option>{LOC_KEYS.map(k=><option key={k} value={k}>{LOC[k]}</option>)}</select>
          <select style={S.sel} value={f.mall} onChange={e=>setF(x=>({...x,mall:e.target.value}))}><option value="">モール（全て）</option>{MALL_KEYS.map(k=><option key={k} value={k}>{MALL[k]}</option>)}</select>
          <input style={S.inp} placeholder="担当者" value={f.operator} onChange={e=>setF(x=>({...x,operator:e.target.value}))}/>
        </div>
      </div>
      <div style={S.card}>
        <div style={{fontSize:12,color:'#6b7280',marginBottom:8}}>{rows.length}件</div>
        <div style={{overflowX:'auto'}}>
          <table style={S.tbl}>
            <thead><tr>
              <th style={S.th}>処理日時</th><th style={S.th}>種別</th><th style={S.th}>商品名</th><th style={S.th}>SKU</th>
              <th style={{...S.th,textAlign:'right'}}>数量</th><th style={S.th}>拠点</th><th style={S.th}>モール</th>
              <th style={S.th}>担当者</th><th style={S.th}>備考</th>
            </tr></thead>
            <tbody>
              {rows.length===0?<tr><td colSpan={9} style={{...S.td,textAlign:'center',color:'#9ca3af'}}>履歴なし</td></tr>:
              rows.map(h=>{
                const[c,b]=tcol[h.type]||['#6b7280','#f3f4f6'];
                const loc=h.type==='transfer'?`${LOC[h.fromLocation]||''} → ${LOC[h.toLocation]||''}`:LOC[h.location]||'';
                return(
                  <tr key={h.id}>
                    <td style={{...S.td,fontSize:12,whiteSpace:'nowrap'}}>{fmtDT(h.date)}</td>
                    <td style={S.td}><span style={S.badge(c,b)}>{HTYPE[h.type]}</span></td>
                    <td style={S.td}><div style={{fontWeight:600,fontSize:12}}>{h.productName}</div></td>
                    <td style={{...S.td,fontFamily:'monospace',fontSize:12}}>{h.sku}</td>
                    <td style={{...S.td,textAlign:'right',fontWeight:700}}>
                      {h.type==='adjustment'?`${h.beforeQty}→${h.afterQty}`:h.quantity}
                    </td>
                    <td style={{...S.td,fontSize:12}}>{loc}</td>
                    <td style={S.td}>{h.mall?<span style={S.badge('#1d4ed8','#dbeafe')}>{MALL[h.mall]||h.mall}</span>:''}</td>
                    <td style={{...S.td,fontSize:12}}>{h.operator}</td>
                    <td style={{...S.td,maxWidth:120,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:12}}>{h.note}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ── ALERTS ──────────────────────────────────
function Alerts({products,inventory}){
  const items=useMemo(()=>{
    const r=[];
    products.filter(p=>p.active).forEach(p=>{
      const inv=inventory[p.id]||{};const t=totalStock(inv);const malls=p.malls||[];
      if(malls.length>0&&t===0)r.push({level:'critical',p,inv,t,msg:'販売中なのに合計在庫0',action:'販売停止確認',ac:'#dc2626'});
      else if(t<=p.safetyStock&&t>0)r.push({level:'warning',p,inv,t,msg:`安全在庫(${p.safetyStock})以下`,action:'発注',ac:'#b45309'});
      else if(t===0)r.push({level:'zero',p,inv,t,msg:'在庫0',action:'補充',ac:'#dc2626'});
      if(inv.amazonFBA===0&&malls.includes('amazon'))r.push({level:'loc',p,inv,t,loc:'amazonFBA',msg:'AmazonFBA在庫0（Amazon出品中）',action:'BOSS確認',ac:'#7c3aed'});
      if(inv.rakuten===0&&(malls.includes('rakuten1')||malls.includes('rakuten2')))r.push({level:'loc',p,inv,t,loc:'rakuten',msg:'楽天ロジ在庫0（楽天出品中）',action:'BOSS確認',ac:'#7c3aed'});
    });
    return r;
  },[products,inventory]);
  const crit=items.filter(x=>x.level==='critical');
  const warn=items.filter(x=>x.level==='warning'||x.level==='zero');
  const locs=items.filter(x=>x.level==='loc');
  const ATable=({rows,bg})=>(
    <table style={S.tbl}>
      <thead><tr>
        <th style={S.th}>商品名</th><th style={S.th}>SKU</th><th style={S.th}>アラート</th>
        <th style={{...S.th,textAlign:'right'}}>現在庫</th><th style={{...S.th,textAlign:'right'}}>安全在庫</th>
        <th style={{...S.th,textAlign:'right'}}>不足数</th><th style={S.th}>販売モール</th><th style={S.th}>推奨対応</th>
      </tr></thead>
      <tbody>
        {rows.map((a,i)=>(
          <tr key={i} style={{background:bg}}>
            <td style={S.td}><div style={{fontWeight:600}}>{a.p.name}</div></td>
            <td style={{...S.td,fontFamily:'monospace',fontSize:12}}>{a.p.sku}</td>
            <td style={S.td}><span style={{color:a.ac,fontWeight:600,fontSize:12}}>{a.msg}</span></td>
            <td style={{...S.td,textAlign:'right',fontWeight:700,color:a.t===0?'#dc2626':'#b45309'}}>{a.t}</td>
            <td style={{...S.td,textAlign:'right'}}>{a.p.safetyStock}</td>
            <td style={{...S.td,textAlign:'right',color:'#dc2626',fontWeight:700}}>{Math.max(0,a.p.safetyStock-a.t)}</td>
            <td style={S.td}><div style={{display:'flex',gap:2,flexWrap:'wrap'}}>{(a.p.malls||[]).map(m=><span key={m} style={{...S.badge('#374151','#f3f4f6'),fontSize:10}}>{MALL[m]}</span>)}</div></td>
            <td style={S.td}><span style={{...S.badge(a.ac,a.ac+'22'),padding:'4px 10px'}}>{a.action}</span></td>
          </tr>
        ))}
      </tbody>
    </table>
  );
  return(
    <div>
      <div style={S.grid4}>
        {[['#dc2626','緊急（販売中在庫0）',crit.length],['#b45309','在庫不足',warn.length],['#7c3aed','拠点別在庫0',locs.length],['#374151','アラート合計',items.length]].map(([c,l,v])=>(
          <div key={l} style={S.statCard(c)}><div style={S.statL}>{l}</div><div style={{...S.statV,color:c}}>{v}<span style={{fontSize:13,fontWeight:400}}> 件</span></div></div>
        ))}
      </div>
      {crit.length>0&&<div style={{...S.card,border:'1px solid #fca5a5'}}><div style={{color:'#dc2626',fontWeight:700,marginBottom:12,fontSize:14}}>緊急：販売中なのに在庫が0の商品</div><div style={{overflowX:'auto'}}><ATable rows={crit} bg="#fff5f5"/></div></div>}
      {warn.length>0&&<div style={{...S.card,border:'1px solid #fcd34d'}}><div style={{color:'#b45309',fontWeight:700,marginBottom:12,fontSize:14}}>在庫不足・補充が必要な商品</div><div style={{overflowX:'auto'}}><ATable rows={warn} bg="#fffbf0"/></div></div>}
      {locs.length>0&&<div style={{...S.card,border:'1px solid #c4b5fd'}}><div style={{color:'#7c3aed',fontWeight:700,marginBottom:12,fontSize:14}}>拠点在庫0アラート（出品モールあり）</div><div style={{overflowX:'auto'}}><ATable rows={locs} bg="#f5f3ff"/></div></div>}
      {items.length===0&&<div style={{...S.card,textAlign:'center',padding:40,color:'#16a34a'}}><div style={{fontSize:32,marginBottom:10}}>✓</div><div style={{fontSize:15,fontWeight:700}}>在庫アラートはありません</div></div>}
    </div>
  );
}

// BOSSのCSV列 → WMS内部フィールド マッピング
const BOSS_PRODUCT_MAP={
  id:'商品ID', name:'商品名', sku:'SKUコード', jan:'JANコード',
  category:'カテゴリー名', safetyStock:'安全在庫設定値', reorderStock:'在庫しきい値',
  active:'取扱停止フラグ', price:'販売価格', memo:'商品コード',
};
// BOSS在庫CSV列マッピング
const BOSS_INV_MAP={
  id:'商品ID', sku:'SKUコード', name:'商品名',
  totalStock:'実在庫数', warehouseStock:'実在庫 (倉庫毎)',
  allocated:'引当済 (倉庫毎)', available:'販売可能数',
  safetyStock:'安全在庫設定値', warehouseId:'倉庫ID', warehouseName:'倉庫',
};

function parseCSVLine(line){
  const result=[];let cur='';let inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++}else{inQ=!inQ}}
    else if(c===','&&!inQ){result.push(cur);cur=''}
    else{cur+=c}
  }
  result.push(cur);
  return result;
}

function CSV({products,setProducts,inventory,setInventory,history}){
  const[tab,setTab]=useState('export');
  const[itype,setItype]=useState('boss');
  const[result,setResult]=useState(null);
  const[preview,setPreview]=useState(null);
  const[bossLocMap,setBossLocMap]=useState({999:'rakuten'});
  const[bossStockField,setBossStockField]=useState('実在庫数');
  const today=new Date().toISOString().slice(0,10);

  const exps={
    products:{label:'商品マスタ',count:products.length,fn:()=>dlCSV(`商品マスタ_${today}.csv`,toCSV(products.map(p=>({商品ID:p.id,商品名:p.name,SKU:p.sku,JANコード:p.jan||'',カテゴリ:p.category,販売単位:p.unit||'',仕入先:p.supplier||'',販売モール:(p.malls||[]).map(m=>MALL[m]).join('|'),通常保管拠点:LOC[p.defaultLocation]||'',安全在庫数:p.safetyStock,発注目安在庫数:p.reorderStock,単価:p.price,メモ:p.memo||'',ステータス:p.active?'有効':'無効'}))))},
    inventory:{label:'在庫一覧',count:products.length,fn:()=>dlCSV(`在庫一覧_${today}.csv`,toCSV(products.map(p=>{const inv=inventory[p.id]||{};const t=totalStock(inv);return{商品ID:p.id,商品名:p.name,SKU:p.sku,楽天ロジスティックス:inv.rakuten||0,西天満事務所:inv.nishitenma||0,堺倉庫:inv.sakai||0,'Amazon FBA倉庫':inv.amazonFBA||0,合計:t,安全在庫:p.safetyStock,ステータス:STATUS_DEF[stockStatus(t,p.safetyStock,p.reorderStock)].label}})))},
    alerts:{label:'在庫不足リスト',count:products.filter(p=>totalStock(inventory[p.id]||{})<=p.safetyStock).length,fn:()=>dlCSV(`在庫不足_${today}.csv`,toCSV(products.filter(p=>totalStock(inventory[p.id]||{})<=p.safetyStock).map(p=>{const t=totalStock(inventory[p.id]||{});return{商品ID:p.id,商品名:p.name,SKU:p.sku,合計在庫:t,安全在庫:p.safetyStock,不足数:Math.max(0,p.safetyStock-t),販売モール:(p.malls||[]).map(m=>MALL[m]).join('|')}})))},
    history:{label:'入出庫履歴',count:history.length,fn:()=>dlCSV(`入出庫履歴_${today}.csv`,toCSV([...history].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(h=>({処理日時:fmtDT(h.date),処理種別:HTYPE[h.type]||'',商品名:h.productName,SKU:h.sku,数量:h.quantity,対象拠点:LOC[h.location]||'',移動元拠点:LOC[h.fromLocation]||'',移動先拠点:LOC[h.toLocation]||'',関連モール:h.mall?MALL[h.mall]||h.mall:'',注文番号:h.orderNo||'',担当者:h.operator||'',備考:h.note||''}))))},
    locs:{label:'拠点別在庫',count:products.length,fn:()=>dlCSV(`拠点別在庫_${today}.csv`,toCSV(products.map(p=>{const inv=inventory[p.id]||{};return{商品名:p.name,SKU:p.sku,...Object.fromEntries(LOC_KEYS.map(k=>[LOC[k],inv[k]||0]))}})))},
  };

  const parseBossProduct=(rows)=>{
    return rows.filter(r=>r[BOSS_PRODUCT_MAP.name]).map(r=>({
      id: r[BOSS_PRODUCT_MAP.id] || genId('P'),
      name: r[BOSS_PRODUCT_MAP.name] || '',
      sku: r[BOSS_PRODUCT_MAP.sku] || '',
      jan: r[BOSS_PRODUCT_MAP.jan] || '',
      category: r[BOSS_PRODUCT_MAP.category] || '美容商品',
      unit: '個',
      supplier: '',
      malls: [],
      defaultLocation: 'rakuten',
      safetyStock: +r[BOSS_PRODUCT_MAP.safetyStock] || 0,
      reorderStock: +r[BOSS_PRODUCT_MAP.reorderStock] || 0,
      price: +r[BOSS_PRODUCT_MAP.price] || 0,
      memo: r[BOSS_PRODUCT_MAP.memo] || '',
      active: r[BOSS_PRODUCT_MAP.active] !== '1',
    }));
  };

  const handleImport=e=>{
    const file=e.target.files[0];if(!file)return;
    const rd=new FileReader();
    rd.onload=ev=>{
      try{
        const text=ev.target.result;
        const lines=text.split(/\r?\n/).filter(l=>l.trim());
        if(lines.length<2){setResult({err:'データが不足しています'});return}
        const hdrs=parseCSVLine(lines[0]).map(h=>h.trim());
        const rows=lines.slice(1).map(ln=>{
          const vs=parseCSVLine(ln);
          return Object.fromEntries(hdrs.map((h,i)=>[h,(vs[i]||'').trim()]));
        });

        if(itype==='boss'){
          const np=parseBossProduct(rows);
          let added=0,updated=0;
          setProducts(prev=>{
            const map=new Map(prev.map(p=>[p.id,p]));
            np.forEach(p=>{if(map.has(p.id)){map.set(p.id,{...map.get(p.id),...p});updated++}else{map.set(p.id,p);added++}});
            return Array.from(map.values());
          });
          setInventory(v=>{const n={...v};np.forEach(p=>{if(!n[p.id])n[p.id]={rakuten:0,nishitenma:0,sakai:0,amazonFBA:0}});return n});
          setPreview(np.slice(0,5));
          setResult({ok:np.length,added,updated});
        } else if(itype==='products'){
          const np=rows.filter(r=>r['商品名']).map(r=>({id:r['商品ID']||genId('P'),name:r['商品名'],sku:r['SKU']||'',jan:r['JANコード']||'',category:r['カテゴリ']||'その他',unit:r['販売単位']||'個',supplier:r['仕入先']||'',malls:[],defaultLocation:'rakuten',safetyStock:+r['安全在庫数']||10,reorderStock:+r['発注目安在庫数']||30,price:+r['単価']||0,memo:r['メモ']||'',active:r['ステータス']!=='無効'}));
          setProducts(prev=>{const ex=new Set(prev.map(p=>p.id));const add=np.filter(p=>!ex.has(p.id));return[...prev,...add]});
          setInventory(v=>{const n={...v};np.forEach(p=>{if(!n[p.id])n[p.id]={rakuten:0,nishitenma:0,sakai:0,amazonFBA:0}});return n});
          setResult({ok:np.length});
        } else if(itype==='boss_inventory'){
          // BOSS在庫CSVインポート：倉庫IDごとにWMS拠点へマッピング
          const upd={};let matched=0,skipped=0;
          rows.forEach(r=>{
            const p=products.find(x=>x.id===r[BOSS_INV_MAP.id]||x.sku===r[BOSS_INV_MAP.sku]);
            if(!p){skipped++;return;}
            const wid=r[BOSS_INV_MAP.warehouseId];
            const loc=bossLocMap[wid];
            if(!loc){skipped++;return;}
            const qty=+r[bossStockField]||0;
            if(!upd[p.id])upd[p.id]={...({rakuten:0,nishitenma:0,sakai:0,amazonFBA:0,...(inventory[p.id]||{})})};
            upd[p.id][loc]=qty;
            matched++;
          });
          setInventory(v=>({...v,...upd}));
          const pv=Object.entries(upd).slice(0,5).map(([pid,inv])=>{
            const p=products.find(x=>x.id===pid);
            return{id:pid,name:p?.name||pid,sku:p?.sku||'',inv};
          });
          setPreview(pv.length?pv:null);
          setResult({ok:matched,skipped,type:'inv'});
        } else if(itype==='inventory'){
          const upd={};rows.forEach(r=>{const p=products.find(x=>x.sku===r['SKU']||x.id===r['商品ID']);if(p)upd[p.id]={rakuten:+r['楽天ロジスティックス']||0,nishitenma:+r['西天満事務所']||0,sakai:+r['堺倉庫']||0,amazonFBA:+r['Amazon FBA倉庫']||0}});
          setInventory(v=>({...v,...upd}));setResult({ok:Object.keys(upd).length});
        }
      }catch(err){setResult({err:'CSV解析エラー: '+err.message})}
    };
    const enc=(itype==='boss'||itype==='boss_inventory')?'Shift_JIS':'UTF-8';
    rd.readAsText(file,enc);e.target.value='';
  };

  const itypeInfo={
    boss:{label:'BOSS商品マスタCSV',badge:'BOSS連携',badgeColor:'#7c3aed',fmt:'取扱停止フラグ,在庫しきい値,安全在庫設定値,商品ID,SKUコード,...,商品名,...,JANコード,...',note:'BOSSからエクスポートしたItem_xxxxxx.csvをそのまま使えます。Shift-JIS自動対応。'},
    boss_inventory:{label:'BOSS在庫CSVインポート',badge:'BOSS連携',badgeColor:'#7c3aed',fmt:'商品ID,商品名,在庫しきい値,...,販売可能数,引当済 (全倉庫),...,実在庫数,倉庫ID,倉庫,実在庫 (倉庫毎),...',note:'BOSSからエクスポートしたInventory_xxxxxx.csvをそのまま使えます。倉庫IDとWMS拠点の対応を下で設定してください。'},
    products:{label:'WMS商品マスタCSV',badge:'標準形式',badgeColor:'#2563eb',fmt:'商品ID,商品名,SKU,JANコード,カテゴリ,販売単位,仕入先,安全在庫数,発注目安在庫数,単価,メモ,ステータス',note:'WMS Proからエクスポートした商品マスタCSVをそのまま取り込めます。'},
    inventory:{label:'WMS在庫数CSV',badge:'標準形式',badgeColor:'#2563eb',fmt:'商品ID,SKU,楽天ロジスティックス,西天満事務所,堺倉庫,Amazon FBA倉庫',note:'拠点ごとの在庫数を一括で上書きします。'},
  };
  const ci=itypeInfo[itype];

  return(
    <div>
      <div style={{display:'flex',gap:8,marginBottom:14}}>
        {['export','import'].map(t=><button key={t} style={{...S.btn(tab===t?'primary':'gray')}} onClick={()=>setTab(t)}>{t==='export'?'エクスポート':'インポート'}</button>)}
      </div>
      {tab==='export'&&(
        <div style={S.card}>
          <div style={{fontSize:15,fontWeight:700,marginBottom:18}}>CSVエクスポート</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12}}>
            {Object.entries(exps).map(([k,v])=>(
              <div key={k} style={{border:'1px solid #e2e8f0',borderRadius:8,padding:14}}>
                <div style={{fontWeight:700,marginBottom:4,fontSize:13}}>{v.label}</div>
                <div style={{fontSize:12,color:'#6b7280',marginBottom:10}}>{v.count}件</div>
                <button style={S.btn('primary')} onClick={v.fn}>ダウンロード</button>
              </div>
            ))}
          </div>
        </div>
      )}
      {tab==='import'&&(
        <div style={S.card}>
          <div style={{fontSize:15,fontWeight:700,marginBottom:18}}>CSVインポート</div>
          <div style={{...S.alertBox('warn'),marginBottom:14}}><strong>注意：</strong>インポートは既存データを上書き・追加します。事前にエクスポートでバックアップを推奨します。</div>
          <div style={S.fg}>
            <label style={S.lbl}>インポート種別</label>
            <select style={{...S.sel,maxWidth:380}} value={itype} onChange={e=>{setItype(e.target.value);setResult(null);setPreview(null)}}>
              <option value="boss">【BOSS連携】商品マスタCSV（Item_xxxxx.csv）</option>
              <option value="boss_inventory">【BOSS連携】在庫CSV（Inventory_xxxxx.csv）</option>
              <option value="products">WMS商品マスタCSV（標準形式）</option>
              <option value="inventory">WMS在庫数CSV（標準形式）</option>
            </select>
          </div>
          <div style={{background:'#f0f9ff',border:'1px solid #bae6fd',borderRadius:6,padding:'10px 14px',marginBottom:14}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
              <span style={S.badge(ci.badgeColor,ci.badgeColor+'18')}>{ci.badge}</span>
              <span style={{fontWeight:600,fontSize:13}}>{ci.label}</span>
            </div>
            <div style={{fontSize:12,color:'#374151',marginBottom:6}}>{ci.note}</div>
            <div style={{fontFamily:'monospace',fontSize:11,color:'#6b7280',background:'#fff',padding:'6px 8px',borderRadius:4,border:'1px solid #e2e8f0',overflowX:'auto',whiteSpace:'nowrap'}}>{ci.fmt}</div>
          </div>
          {itype==='boss_inventory'&&(
            <div style={{border:'1px solid #e2e8f0',borderRadius:8,padding:14,marginBottom:14,background:'#fafafa'}}>
              <div style={{fontWeight:700,fontSize:13,marginBottom:10}}>倉庫マッピング設定</div>
              <div style={{fontSize:12,color:'#6b7280',marginBottom:12}}>BOSSの倉庫IDがWMSのどの拠点に対応するか設定します。<br/>現在のBOSSの倉庫：<strong>999 = RFC倉庫</strong></div>
              <div style={{display:'grid',gridTemplateColumns:'auto 1fr',gap:'8px 12px',alignItems:'center',maxWidth:400}}>
                <div style={{fontSize:13,fontWeight:600}}>倉庫ID 999（RFC倉庫）</div>
                <select style={S.sel} value={bossLocMap[999]||'rakuten'} onChange={e=>setBossLocMap(m=>({...m,999:e.target.value}))}>
                  {LOC_KEYS.map(k=><option key={k} value={k}>{LOC[k]}</option>)}
                </select>
              </div>
              <div style={{fontWeight:700,fontSize:13,marginTop:12,marginBottom:8}}>取込む在庫数の種類</div>
              <div style={{display:'flex',gap:12}}>
                {[['実在庫数','実在庫数（倉庫の物理在庫）'],['販売可能数','販売可能数（引当済を除く）']].map(([v,l])=>(
                  <label key={v} style={{display:'flex',alignItems:'center',gap:6,cursor:'pointer',fontSize:13,padding:'6px 10px',borderRadius:6,border:`1px solid ${bossStockField===v?'#2563eb':'#e2e8f0'}`,background:bossStockField===v?'#eff6ff':'#fff'}}>
                    <input type="radio" name="stockField" value={v} checked={bossStockField===v} onChange={()=>setBossStockField(v)}/>{l}
                  </label>
                ))}
              </div>
            </div>
          )}
          <div style={S.fg}><label style={S.lbl}>CSVファイルを選択</label><input type="file" accept=".csv" onChange={handleImport}/></div>
          {result&&(
            <div style={S.alertBox(result.err?'error':'ok')}>
              {result.err?`エラー: ${result.err}`
                :result.type==='inv'
                  ?`在庫インポート完了：${result.ok}件反映（${result.skipped}件はスキップ）`
                  :result.added!=null
                    ?`インポート完了：${result.ok}件処理（新規追加 ${result.added}件 / 更新 ${result.updated}件）`
                    :`インポート完了：${result.ok}件処理しました`}
            </div>
          )}
          {preview&&preview.length>0&&(
            <div style={{marginTop:14}}>
              <div style={{fontSize:12,fontWeight:700,marginBottom:6,color:'#374151'}}>取込プレビュー（先頭5件）</div>
              <div style={{overflowX:'auto'}}>
                {result?.type==='inv'?(
                  <table style={S.tbl}>
                    <thead><tr>
                      <th style={S.th}>商品名</th><th style={S.th}>SKU</th>
                      {LOC_KEYS.map(k=><th key={k} style={{...S.th,textAlign:'right'}}>{LOC[k]}</th>)}
                    </tr></thead>
                    <tbody>
                      {preview.map(p=>(
                        <tr key={p.id}>
                          <td style={S.td}>{p.name}</td>
                          <td style={{...S.td,fontFamily:'monospace',fontSize:12}}>{p.sku}</td>
                          {LOC_KEYS.map(k=><td key={k} style={{...S.td,textAlign:'right',fontWeight:p.inv[k]>0?700:400,color:p.inv[k]>0?'#0f172a':'#d1d5db'}}>{p.inv[k]||0}</td>)}
                        </tr>
                      ))}
                    </tbody>
                  </table>
                ):(
                  <table style={S.tbl}>
                    <thead><tr>
                      <th style={S.th}>商品ID</th><th style={S.th}>商品名</th><th style={S.th}>SKU</th>
                      <th style={S.th}>JANコード</th><th style={S.th}>安全在庫</th><th style={S.th}>有効</th>
                    </tr></thead>
                    <tbody>
                      {preview.map(p=>(
                        <tr key={p.id}>
                          <td style={{...S.td,fontFamily:'monospace',fontSize:12}}>{p.id}</td>
                          <td style={S.td}>{p.name}</td>
                          <td style={{...S.td,fontFamily:'monospace',fontSize:12}}>{p.sku}</td>
                          <td style={S.td}>{p.jan}</td>
                          <td style={{...S.td,textAlign:'right'}}>{p.safetyStock}</td>
                          <td style={S.td}><span style={S.badge(p.active?'#15803d':'#6b7280',p.active?'#dcfce7':'#f3f4f6')}>{p.active?'有効':'停止'}</span></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                )}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── MAIN APP ─────────────────────────────────
const PAGES=[
  {id:'dashboard',label:'ダッシュボード',icon:'▦'},
  {id:'products',label:'商品マスタ',icon:'◈'},
  {id:'inventory',label:'在庫一覧',icon:'≡'},
  {id:'inbound',label:'入庫処理',icon:'↓'},
  {id:'outbound',label:'出庫処理',icon:'↑'},
  {id:'transfer',label:'拠点間移動',icon:'⇄'},
  {id:'adjustment',label:'在庫調整',icon:'⚖'},
  {id:'history',label:'入出庫履歴',icon:'⊟'},
  {id:'alerts',label:'在庫不足アラート',icon:'⚠',badge:true},
  {id:'csv',label:'CSV管理',icon:'↧'},
  {id:'trend',label:'在庫推移',icon:'↗'},
];
const PTITLE={dashboard:'ダッシュボード',products:'商品マスタ管理',inventory:'在庫一覧',inbound:'入庫処理',outbound:'出庫処理',transfer:'拠点間移動処理',adjustment:'在庫調整',history:'入出庫・移動履歴',alerts:'在庫不足アラート',csv:'CSV管理',trend:'在庫推移グラフ'};

function Trend({products,inventory}){
  const[trendData,setTrendData]=useState(null);
  const[loading,setLoading]=useState(true);
  const[fetchErr,setFetchErr]=useState(null);
  const[selId,setSelId]=useState(null);
  const[query,setQuery]=useState('');
  const[days,setDays]=useState(30);
  const canvasRef=useRef(null);
  const chartRef=useRef(null);

  useEffect(()=>{
    fetch('/boss_trend.json')
      .then(r=>{if(!r.ok)throw new Error('404');return r.json();})
      .then(d=>{setTrendData(d);setLoading(false);})
      .catch(()=>{setFetchErr(true);setLoading(false);});
  },[]);

  useEffect(()=>{
    if(!canvasRef.current||!trendData||!selId)return;
    if(chartRef.current)chartRef.current.destroy();
    const slice=trendData.slice(-days);
    const labels=slice.map(d=>d.date.slice(5));
    const vals=slice.map(d=>d.data[selId]||0);
    chartRef.current=new Chart(canvasRef.current,{
      type:'line',
      data:{
        labels,
        datasets:[{
          label:'総在庫数',data:vals,
          borderColor:'#4f46e5',backgroundColor:'rgba(79,70,229,0.08)',
          fill:true,tension:0.3,pointRadius:3,pointHoverRadius:5,
        }]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.parsed.y}個`}}},
        scales:{
          y:{beginAtZero:false,ticks:{callback:v=>v+'個'},grid:{color:'#f3f4f6'}},
          x:{grid:{display:false}},
        }
      }
    });
    return()=>{if(chartRef.current){chartRef.current.destroy();chartRef.current=null;}};
  },[trendData,selId,days]);

  const filtered=useMemo(()=>{
    const q=query.toLowerCase();
    const list=q?products.filter(p=>p.name.toLowerCase().includes(q)||p.sku.toLowerCase().includes(q)):products;
    return list.slice(0,100);
  },[products,query]);

  const selProd=useMemo(()=>products.find(p=>p.id===selId),[products,selId]);

  const stats=useMemo(()=>{
    if(!trendData||!selId)return null;
    const vals=trendData.slice(-days).map(d=>d.data[selId]||0);
    if(!vals.length)return null;
    const cur=vals[vals.length-1];
    const chg=vals.length>1?cur-vals[0]:0;
    return{cur,max:Math.max(...vals),min:Math.min(...vals),avg:Math.round(vals.reduce((a,b)=>a+b,0)/vals.length),chg};
  },[trendData,selId,days]);

  const curStock=selId?totalStock(inventory[selId]||{}):0;

  if(loading)return <div style={{padding:32,color:'#6b7280',textAlign:'center'}}>読み込み中...</div>;

  if(fetchErr)return(
    <div style={{padding:32,textAlign:'center'}}>
      <div style={{fontSize:48,marginBottom:16}}>📊</div>
      <div style={{fontSize:16,fontWeight:600,color:'#374151',marginBottom:8}}>在庫推移データがまだありません</div>
      <div style={{fontSize:13,color:'#6b7280',lineHeight:1.6}}>
        <code style={{background:'#f3f4f6',padding:'2px 6px',borderRadius:4}}>boss_sync.py</code> を実行すると<br/>
        毎日の在庫スナップショットが蓄積されていきます。
      </div>
    </div>
  );

  const statCards=[
    {label:'現在庫（実績）',val:curStock+'個',color:'#4f46e5'},
    {label:'最大',val:stats?stats.max+'個':'—',color:'#059669'},
    {label:'最小',val:stats?stats.min+'個':'—',color:'#dc2626'},
    {label:'平均',val:stats?stats.avg+'個':'—',color:'#d97706'},
    {label:'期間変化',val:stats?(stats.chg>=0?'+':'')+stats.chg+'個':'—',color:stats&&stats.chg>=0?'#059669':'#dc2626'},
  ];

  return(
    <div style={{display:'flex',gap:16,height:'calc(100vh - 130px)'}}>
      <div style={{width:240,flexShrink:0,background:'#fff',borderRadius:8,border:'1px solid #e5e7eb',display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <div style={{padding:'10px 12px',borderBottom:'1px solid #e5e7eb',background:'#f9fafb'}}>
          <input
            style={{width:'100%',padding:'6px 10px',border:'1px solid #d1d5db',borderRadius:6,fontSize:12,boxSizing:'border-box'}}
            placeholder="商品名・SKUで検索"
            value={query}
            onChange={e=>setQuery(e.target.value)}
          />
        </div>
        <div style={{flex:1,overflowY:'auto'}}>
          {filtered.map(p=>(
            <div key={p.id}
              style={{padding:'8px 12px',cursor:'pointer',borderBottom:'1px solid #f3f4f6',
                background:selId===p.id?'#eff6ff':'transparent',
                borderLeft:selId===p.id?'3px solid #4f46e5':'3px solid transparent'}}
              onClick={()=>setSelId(p.id)}>
              <div style={{fontSize:12,fontWeight:selId===p.id?600:400,color:'#111827',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{p.name}</div>
              <div style={{fontSize:11,color:'#9ca3af'}}>{p.sku}</div>
            </div>
          ))}
        </div>
      </div>

      <div style={{flex:1,display:'flex',flexDirection:'column',gap:12,minWidth:0}}>
        {!selId?(
          <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',background:'#fff',borderRadius:8,border:'1px solid #e5e7eb',color:'#9ca3af',fontSize:14}}>
            ← 左の一覧から商品を選択してください
          </div>
        ):(
          <>
            <div style={{background:'#fff',borderRadius:8,border:'1px solid #e5e7eb',padding:'12px 16px',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
              <div>
                <div style={{fontWeight:600,fontSize:14,color:'#111827'}}>{selProd?.name}</div>
                <div style={{fontSize:12,color:'#6b7280'}}>SKU: {selProd?.sku} | カテゴリ: {selProd?.category||'—'}</div>
              </div>
              <div style={{display:'flex',gap:6}}>
                {[30,60,90].map(d=>(
                  <button key={d} onClick={()=>setDays(d)}
                    style={{padding:'4px 12px',borderRadius:6,border:'1px solid',fontSize:12,cursor:'pointer',
                      background:days===d?'#4f46e5':'#fff',color:days===d?'#fff':'#374151',borderColor:days===d?'#4f46e5':'#d1d5db'}}>
                    {d}日
                  </button>
                ))}
              </div>
            </div>

            <div style={{display:'flex',gap:10,flexShrink:0}}>
              {statCards.map(({label,val,color})=>(
                <div key={label} style={{flex:1,background:'#fff',borderRadius:8,border:'1px solid #e5e7eb',padding:'10px 12px',textAlign:'center'}}>
                  <div style={{fontSize:10,color:'#6b7280',marginBottom:4}}>{label}</div>
                  <div style={{fontSize:16,fontWeight:700,color}}>{val}</div>
                </div>
              ))}
            </div>

            <div style={{flex:1,background:'#fff',borderRadius:8,border:'1px solid #e5e7eb',padding:16,minHeight:0}}>
              <div style={{fontSize:12,color:'#6b7280',marginBottom:8}}>過去{days}日間の在庫推移（データ数: {Math.min(trendData?.length||0,days)}日分）</div>
              <div style={{height:'calc(100% - 28px)',position:'relative'}}>
                <canvas ref={canvasRef}/>
              </div>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

function App(){
  const[page,setPage]=useState('dashboard');
  const[products,setProducts]=useLS('wms_products',INIT_PRODUCTS);
  const[inventory,setInventory]=useLS('wms_inventory',INIT_INV);
  const[history,setHistory]=useLS('wms_history',[]);
  const addHist=useCallback(e=>setHistory(h=>[...h,{...e,id:genId('H')}]),[]);
  const alertCnt=useMemo(()=>products.filter(p=>totalStock(inventory[p.id]||{})<=p.safetyStock).length,[products,inventory]);
  const now=new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
  return(
    <div style={S.app}>
      <div style={S.sb}>
        <div style={S.sbTop}>
          <div style={S.sbSub}>在庫管理システム</div>
          <div style={S.sbTitle}>WMS Pro</div>
        </div>
        <nav style={S.nav}>
          {PAGES.map(p=>(
            <div key={p.id} style={S.ni(page===p.id)} onClick={()=>setPage(p.id)}>
              <span style={{fontSize:14,width:16,textAlign:'center',flexShrink:0}}>{p.icon}</span>
              <span style={{flex:1}}>{p.label}</span>
              {p.badge&&alertCnt>0&&<span style={{background:'#dc2626',color:'#fff',borderRadius:10,padding:'0 6px',fontSize:11,fontWeight:700}}>{alertCnt}</span>}
            </div>
          ))}
        </nav>
        <div style={S.sbFt}>BOSS補完システム v1.0<br/>データ: ブラウザ保存</div>
      </div>
      <div style={S.main}>
        <div style={S.hdr}>
          <h1 style={S.hdrTitle}>{PTITLE[page]}</h1>
          <div style={{fontSize:12,color:'#6b7280'}}>{now}</div>
        </div>
        <div style={S.body}>
          {page==='dashboard'&&<Dashboard products={products} inventory={inventory} history={history}/>}
          {page==='products'&&<ProductMaster products={products} setProducts={setProducts} inventory={inventory} setInventory={setInventory}/>}
          {page==='inventory'&&<InventoryList products={products} inventory={inventory}/>}
          {page==='inbound'&&<Inbound products={products} inventory={inventory} setInventory={setInventory} addHist={addHist}/>}
          {page==='outbound'&&<Outbound products={products} inventory={inventory} setInventory={setInventory} addHist={addHist}/>}
          {page==='transfer'&&<Transfer products={products} inventory={inventory} setInventory={setInventory} addHist={addHist}/>}
          {page==='adjustment'&&<Adjustment products={products} inventory={inventory} setInventory={setInventory} addHist={addHist}/>}
          {page==='history'&&<History history={history}/>}
          {page==='alerts'&&<Alerts products={products} inventory={inventory}/>}
          {page==='csv'&&<CSV products={products} setProducts={setProducts} inventory={inventory} setInventory={setInventory} history={history}/>}
          {page==='trend'&&<Trend products={products} inventory={inventory}/>}
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
